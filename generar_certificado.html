<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generando Certificado...</title>
    <!-- Importamos jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; background-color: #f8fafc; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #004899; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .debug-box { background: #fee2e2; color: #991b1b; padding: 15px; margin: 20px auto; width: 80%; border-radius: 8px; text-align: left; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2 id="titulo-estado" style="color: #004899;">Generando tu certificado ITCA...</h2>
    <p id="subtitulo-estado">La descarga comenzará automáticamente en unos segundos.</p>
    <div id="area-errores"></div>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCKLT4vWDt3oStw9rF6eT0ngRrpVamanjc",
        authDomain: "itcaacademy2-0.firebaseapp.com",
        databaseURL: "https://user-itcaacademy2-0-default-rtdb.firebaseio.com/",
        projectId: "itcaacademy2-0",
        storageBucket: "itcaacademy2-0.firebasestorage.app",
        messagingSenderId: "100451769928",
        appId: "1:100451769928:web:b9e79e8e7a1c90cb9a427d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const params = new URLSearchParams(window.location.search);
    const cedula = params.get('cedula');
    const moduloId = params.get('modulo');

    if(cedula && moduloId) {
        buscarYGenerarCertificado(cedula, moduloId);
    } else {
        mostrarError("Faltan datos en la URL.", "Asegúrate de abrir esto desde la app de Unity.");
    }

    async function buscarYGenerarCertificado(cedulaEstudiante, idModuloTarget) {
        try {
            const resultadosRef = ref(db, 'registro_evaluaciones'); 
            const snapshot = await get(resultadosRef);

            if (!snapshot.exists()) {
                mostrarError("La carpeta 'registro_evaluaciones' no existe en Firebase.", "Si ves esto, estás leyendo una versión en caché del navegador. Por favor abre esta pestaña en Modo Incógnito.");
                return;
            }

            let datosFinales = null;
            let notaMasAlta = -1;
            let logBusqueda = "";

            const reqCedula = cedulaEstudiante.toString().trim();
            const reqModulo = idModuloTarget.toString().trim().toUpperCase();

            snapshot.forEach(doc => {
                const sessionData = doc.val();
                const sCedula = sessionData.usuarioId ? sessionData.usuarioId.toString().trim() : "N/A";
                const sModulo = sessionData.moduloId ? sessionData.moduloId.toString().trim().toUpperCase() : "N/A";
                
                if (sCedula === reqCedula && sModulo === reqModulo) {
                    logBusqueda += `<li>✅ Sesión encontrada. `;
                    if (sessionData.POST) {
                        const notaPOST = parseFloat(sessionData.POST.nota);
                        logBusqueda += `(Nota POST: ${notaPOST})</li>`;
                        if (notaPOST > notaMasAlta) {
                            notaMasAlta = notaPOST;
                            datosFinales = sessionData.POST; 
                        }
                    } else {
                        logBusqueda += `(Pero no tiene examen POST adentro)</li>`;
                    }
                }
            });

            if (datosFinales && notaMasAlta >= 7.0) { 
                
                const moduloSnap = await get(ref(db, `modulos/${idModuloTarget}`));
                const nombreModulo = moduloSnap.exists() ? moduloSnap.val().nombre : "Módulo de Realidad Aumentada";

                const usuarioSnap = await get(ref(db, `Usuarios/${cedulaEstudiante}`));
                let nombreEstudiante = "ESTUDIANTE";
                
                if (usuarioSnap.exists()) {
                    const infoUsr = usuarioSnap.val();
                    nombreEstudiante = `${infoUsr.nombre || infoUsr.Nombre || ""} ${infoUsr.apellido || infoUsr.Apellido || ""}`.trim();
                }
                
                const base64Fondo = await imageToBase64('./assets/fondo_certificado.jpeg');
                armarPDF(nombreEstudiante, nombreModulo, datosFinales.nota, datosFinales.fecha, base64Fondo, cedulaEstudiante);
                
            } else {
                mostrarError("No se encontró un examen POST aprobado (Nota mínima: 7.0).", 
                             `<b>Cédula buscada:</b> ${reqCedula} <br> 
                              <b>Módulo buscado:</b> ${reqModulo} <br><br> 
                              <b>Reporte interno:</b><ul>${logBusqueda || "<li>No hay ninguna sesión para este alumno.</li>"}</ul>`);
            }

        } catch (error) {
            console.error(error);
            mostrarError("Error técnico al conectar con Firebase.", error.message);
        }
    }

    function mostrarError(titulo, detalle) {
        document.querySelector(".loader").style.display = "none";
        document.getElementById("titulo-estado").innerText = "Algo salió mal";
        document.getElementById("titulo-estado").style.color = "#dc2626";
        document.getElementById("subtitulo-estado").innerText = titulo;
        document.getElementById("area-errores").innerHTML = `<div class="debug-box">${detalle}</div>`;
    }

    function armarPDF(nombre, modulo, nota, fecha, base64Fondo, cedula) {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
        
        const width = docPDF.internal.pageSize.getWidth();
        const height = docPDF.internal.pageSize.getHeight();
        const centroDerechoX = (width * 0.73);

        docPDF.addImage(base64Fondo, 'JPEG', 0, 0, width, height);
        docPDF.setFont("helvetica", "bold");
        docPDF.setFontSize(28); 
        docPDF.setTextColor(0, 72, 153); 
        docPDF.text("ITCA ACADEMY 2.0", centroDerechoX, 35, { align: "center" });

        docPDF.setFontSize(14);
        docPDF.setTextColor(100);
        docPDF.text("CENTRO DE CAPACITACIÓN", centroDerechoX, 42, { align: "center" });
        docPDF.text("TECNOLÓGICA", centroDerechoX, 47, { align: "center" });

        docPDF.setFontSize(20);
        docPDF.setTextColor(40);
        docPDF.text("CERTIFICADO DE APROBACIÓN", centroDerechoX, 70, { align: "center" });

        docPDF.setFont("helvetica", "normal");
        docPDF.setFontSize(13);
        docPDF.text("Se otorga el presente reconocimiento a:", centroDerechoX, 85, { align: "center" });

        docPDF.setFont("helvetica", "bold");
        docPDF.setFontSize(26);
        docPDF.setTextColor(0, 0, 0);
        docPDF.text(nombre.toUpperCase(), centroDerechoX, 103, { align: "center" }); 
        
        docPDF.setFont("helvetica", "normal");
        docPDF.setFontSize(12);
        docPDF.setTextColor(80);
        docPDF.text(`Con documento de identidad (C.I.): ${cedula}`, centroDerechoX, 111, { align: "center" });

        docPDF.setFontSize(13);
        docPDF.setTextColor(60);
        docPDF.text(`Por haber aprobado satisfactoriamente`, centroDerechoX, 122, { align: "center" });
        docPDF.text(`la evaluación del módulo:`, centroDerechoX, 127, { align: "center" });
        
        docPDF.setFont("helvetica", "bold");
        const splitModulo = docPDF.splitTextToSize(`"${modulo}"`, 110); 
        docPDF.text(splitModulo, centroDerechoX, 137, { align: "center" });

        const notaNumerica = parseFloat(nota);
        docPDF.text(`Calificación: ${notaNumerica.toFixed(2)}/10`, centroDerechoX, 152, { align: "center" });

        const fechaSegura = fecha.replace(" ", "T");
        const fechaFormateada = new Date(fechaSegura).toLocaleDateString('es-EC', { year: 'numeric', month: 'long', day: 'numeric' });
        
        docPDF.setFontSize(11);
        docPDF.text(`Ibarra, Imbabura - ${fechaFormateada}`, centroDerechoX, 167, { align: "center" });

        const firmaIzqX = centroDerechoX - 35; 
        const firmaDerX = centroDerechoX + 35; 
        docPDF.setDrawColor(0); 
        docPDF.setLineWidth(0.4);
        docPDF.line(firmaIzqX - 25, 185, firmaIzqX + 25, 185); 
        docPDF.text("Coordinación ITCA", firmaIzqX, 191, { align: "center" });
        docPDF.line(firmaDerX - 25, 185, firmaDerX + 25, 185);
        docPDF.text("Instructor Responsable", firmaDerX, 191, { align: "center" });

        docPDF.setTextColor(60);
        docPDF.setFontSize(9);
        const splitPie = docPDF.splitTextToSize("Este certificado es válido como registro de actividad académica en la plataforma ITCA Academy.", 120);
        docPDF.text(splitPie, centroDerechoX, height - 12, { align: "center" });

        docPDF.save(`Certificado_${modulo}_ITCA.pdf`);
        
        document.getElementById("titulo-estado").innerText = "¡Descarga Completada!";
        document.getElementById("subtitulo-estado").innerText = "Revisa la carpeta de descargas de tu celular.";
        document.querySelector(".loader").style.display = "none";
    }

    async function imageToBase64(url) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = 'Anonymous'; 
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                resolve(canvas.toDataURL('image/jpeg')); 
            };
            img.onerror = (error) => reject(error);
            img.src = url;
        });
    }
    </script>
</body>
</html>
